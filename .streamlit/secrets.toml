# ─── IntelliClone — User Authentication ──────────────────────────────────────
#
# HOW TO USE:
#   Local dev  : Place this file at .streamlit/secrets.toml in the project root.
#                Add ".streamlit/secrets.toml" to .gitignore — never commit it.
#   Streamlit Cloud : Go to App Settings → Secrets and paste the content below.
#
# PASSWORD OPTIONS (choose one per user):
#   password      = "plain text"   — simplest; Streamlit Cloud encrypts it at rest
#   password_hash = "sha256hex"    — pre-hashed; generate with:
#                   python -c "import hashlib; print(hashlib.sha256(b'yourpw').hexdigest())"
#
# ROLES (displayed in the sidebar):
#   role = "Administrator" | "Data Analyst" | "Viewer" | any custom label
#
# Add as many [users.<username>] blocks as needed.
# ─────────────────────────────────────────────────────────────────────────────

